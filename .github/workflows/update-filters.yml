name: Update filters

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - filters.txt
      - manual-rules/**
      - scripts/**
      - .github/workflows/update-filters.yml
  schedule:
    - cron: '0 1 * * *'
 
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: cd scripts && bun install --frozen-lockfile

      - name: Run full pipeline
        run: cd scripts && bun run all

      - name: Commit updated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update filters'
          file_pattern: 'filters.txt not-found.txt categories/*.txt filter/*.txt'
