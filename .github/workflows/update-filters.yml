name: Update filters

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - categories/**
      - filters.txt
      - not-found.txt
      - manual-rules/**
      - scripts/**
      - .github/workflows/update-filters.yml
  schedule:
    - cron: '0 1 * * *'
 
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Git LFS
        run: git lfs install

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: scripts

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config http.postBuffer 524288000
          git lfs install

      - name: "Build filter lists from categories and filters.txt"
        run: bun run index.ts all
        working-directory: scripts

      - name: "Commit & push: built filters"
        run: |
          git add filter/*.txt not-found.txt
          if git diff --cached --quiet; then
            echo "No built filter changes"
          else
            git commit -m "chore(filter): rebuild generated filters"
            git push
          fi
