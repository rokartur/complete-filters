name: Update filters

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - categories/**
      - filters.txt
      - manual-rules/**
      - scripts/**
      - .github/workflows/update-filters.yml
  schedule:
    - cron: '0 1 * * *'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GIT_LFS_SKIP_SMUDGE: '1'

concurrency:
  group: update-filters
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Disable Git LFS for push
        run: |
          git lfs uninstall || true
          git config --unset-all filter.lfs.smudge || true
          git config --unset-all filter.lfs.clean || true
          git config --unset-all filter.lfs.process || true
          git config --unset-all filter.lfs.required || true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: scripts

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build filter lists
        run: bun run index.ts all
        working-directory: scripts

      - name: Commit & push built filters
        run: |
          git add filter/*.txt not-found.txt
          if git diff --cached --quiet; then
            echo "No filter changes to commit"
          else
            git commit -m "chore(filter): rebuild generated filters"
            git push
            echo "Filters updated and pushed"
          fi
