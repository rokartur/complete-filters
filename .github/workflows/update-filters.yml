name: Update filters

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - filters.txt
      - manual-rules/**
      - scripts/**
      - .github/workflows/update-filters.yml
  schedule:
    - cron: '0 1 * * *'
 
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Git LFS
        run: git lfs install

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: scripts

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config http.postBuffer 524288000
          git lfs install

      - name: "Phase 1: Discover filter list URLs"
        run: bun run index.ts fetch
        working-directory: scripts

      - name: "Commit & push: discovery phase"
        run: |
          git add filters.txt not-found.txt
          if git diff --cached --quiet; then
            echo "No changes in discovery phase"
          else
            git commit -m "chore: update discovered filter lists"
            git push
          fi

      - name: "Phase 2: Categorize sources"
        run: bun run index.ts categorize
        working-directory: scripts

      - name: "Commit & push: categorization phase"
        run: |
          for file in categories/*.txt; do
            if [ -f "$file" ]; then
              category=$(basename "$file" .txt)
              git add "$file"
              if ! git diff --cached --quiet; then
                git commit -m "chore(categories): update ${category}"
                git push
              fi
            fi
          done

      - name: "Phase 3: Build filter lists"
        run: bun run index.ts build
        working-directory: scripts

      - name: "Commit & push: built filters per category"
        run: |
          for file in filter/*.txt; do
            if [ -f "$file" ]; then
              category=$(basename "$file" .txt)
              git add "$file"
              if ! git diff --cached --quiet; then
                git commit -m "chore(filter): update ${category}"
                git push
              fi
            fi
          done
